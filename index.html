<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relaxaa — Woven with Care, Crafted for Dreams</title>
  <meta name="description" content="Relaxaa Home Textiles - Premium bamboo and cotton bedsheets, Camasi designer shirts, and children's comfort wear. Sustainable luxury for your home and wardrobe.">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { overflow: hidden; }
    .splash-particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--lavender-light);
      opacity: 0;
    }
    .splash-progress {
      position: absolute;
      bottom: 80px;
      width: 200px;
      height: 2px;
      background: var(--cream-dark);
      border-radius: 2px;
      overflow: hidden;
    }
    .splash-progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--lavender), var(--gold));
      border-radius: 2px;
      animation: progressFill 3s ease-in-out forwards;
    }
    @keyframes progressFill {
      to { width: 100%; }
    }
    @keyframes particleDrift {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      20%  { opacity: 0.6; transform: translateY(-20px) scale(1); }
      100% { opacity: 0; transform: translateY(-120px) scale(0.3); }
    }
  </style>
</head>
<body>
  <div class="splash-screen" id="splash">
    <!-- Lavender glow orb -->
    <div class="splash-glow"></div>

    <!-- Floating particles -->
    <div class="splash-particles" id="particles"></div>

    <!-- Logo & Brand -->
    <img src="assets/logo-full.jpg" alt="Relaxaa" class="splash-logo" style="width:100px; height:100px; border-radius:50%; object-fit:cover;">
    <div class="splash-title">Relaxaa</div>
    <div class="splash-tagline">Woven with Care, Crafted for Dreams</div>

    <!-- Progress bar -->
    <div class="splash-progress">
      <div class="splash-progress-bar"></div>
    </div>
  </div>

  <script>
    // Generate floating particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = 40 + Math.random() * 50 + '%';
      p.style.animationDelay = Math.random() * 2 + 's';
      p.style.animation = `particleDrift ${2 + Math.random() * 3}s ease-in-out ${Math.random() * 2}s infinite`;
      particlesContainer.appendChild(p);
    }

    // Redirect after splash
    setTimeout(() => {
      const splash = document.getElementById('splash');
      splash.classList.add('exit');
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 800);
    }, 3200);
  </script>
</body>
</html>
